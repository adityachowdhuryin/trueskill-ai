

services:
  # Neo4j Graph Database
  # Stores code structure: Files, Classes, Functions, Imports and their relationships
  neo4j:
    image: neo4j:latest
    container_name: trueskill-neo4j
    ports:
      - "7474:7474"  # HTTP (Browser interface)
      - "7687:7687"  # Bolt (Driver connections)
    environment:
      - NEO4J_AUTH=neo4j/trueskill_password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    networks:
      - trueskill-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trueskill-backend
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=trueskill_password
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - trueskill-network
    volumes:
      - ./backend:/app
    # Uncomment below for development with hot reload
    # command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (Next.js) - for production builds
  # During development, run `npm run dev` locally instead
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trueskill-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - trueskill-network

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:

networks:
  trueskill-network:
    driver: bridge
